<script>
// ── Theme (before-paint) ──────────────────────────────
(function () {
  var t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>

<script>
// ── Translation dictionary ────────────────────────────
var ZH_TAGLINE = '農業、環境與生態經濟學 &nbsp;·&nbsp; 都市、區域與交通經濟學';
var EN_TAGLINE = 'Agricultural &amp; Environmental Economics &nbsp;·&nbsp; Urban &amp; Transportation Economics';

// ── Lang helpers ──────────────────────────────────────
function isZhPage() {
  var page = location.pathname.split('/').pop() || '';
  return page.indexOf('-zh') !== -1;
}
function getLang() { return isZhPage() ? 'zh' : 'en'; }

// Page pairs: en ↔ zh
var PAGE_PAIRS = {
  'about.html':       'about-zh.html',
  'about-zh.html':    'about.html',
  'research.html':    'research-zh.html',
  'research-zh.html': 'research.html',
  'teach.html':       'teach-zh.html',
  'teach-zh.html':    'teach.html',
  'index.html':       'index-zh.html',
  'index-zh.html':    'index.html',
};

function toggleLangGlobal() {
  var page = location.pathname.split('/').pop() || 'index.html';
  if (!page.endsWith('.html')) page = page + '.html';
  var target = PAGE_PAIRS[page];
  if (target && target !== page) {
    location.href = target;
    return;
  }
  applyLangGlobal();
}

function applyLangGlobal() {
  var lang = getLang();
  var btn = document.getElementById('globalLangToggle');
  if (btn) btn.textContent = lang === 'en' ? '中文' : 'English';

  // data-en / data-zh elements (landing page)
  document.querySelectorAll('[data-en][data-zh]').forEach(function (el) {
    var val = el.getAttribute('data-' + lang);
    if (!val) return;
    if (el.tagName === 'A' || el.tagName === 'BUTTON' || el.tagName === 'SPAN') {
      el.textContent = val;
    } else {
      el.innerHTML = val;
    }
  });

  // Landing tagline
  var tl = document.querySelector('.landing-tagline');
  if (tl) tl.innerHTML = lang === 'zh' ? ZH_TAGLINE : EN_TAGLINE;
}

// ── Boot ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function () {
  var search = document.querySelector('#quarto-search');
  var btn = document.createElement('button');
  btn.id = 'globalLangToggle';
  btn.className = 'global-lang-toggle';
  btn.onclick = toggleLangGlobal;
  btn.textContent = getLang() === 'en' ? '中文' : 'English';

  // Theme toggle button
  var themeBtn = document.createElement('button');
  themeBtn.id = 'themeToggleBtn';
  themeBtn.className = 'navbar-icon-btn';
  var currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
  themeBtn.textContent = currentTheme === 'dark' ? '☀' : '☾';
  themeBtn.onclick = function () {
    var t = document.documentElement.getAttribute('data-theme') || 'light';
    var next = t === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    themeBtn.textContent = next === 'dark' ? '☀' : '☾';
  };

  btn.className = 'navbar-icon-btn';

  // Wrap both buttons together, insert right before search icon
  var wrap = document.createElement('div');
  wrap.className = 'navbar-btn-group';
  wrap.appendChild(themeBtn);
  wrap.appendChild(btn);

  if (search && search.parentNode) {
    search.parentNode.insertBefore(wrap, search);
  } else {
    var nb = document.querySelector('.navbar-collapse, .navbar > .container-fluid, .navbar > .container');
    if (nb) nb.appendChild(wrap);
  }

  applyLangGlobal();
});
</script>
