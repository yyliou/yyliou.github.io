<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Citation chart preview</title>
<style>
  body { font-family: 'Palatino Linotype','Book Antiqua',Georgia,serif; max-width: 720px; margin: 2rem auto; padding: 0 1.2rem; background: var(--bg,#fefdfb); color: var(--fg,#222); transition: background .2s; }
  [data-theme="dark"] body, body[data-theme="dark"] { }
  .toggle { float: right; font-family: system-ui, sans-serif; font-size: .8rem; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; padding: 4px 10px; background: transparent; color: inherit; }

  /* ---- copied from styles.css ---- */
  .bib-stats { display:flex; justify-content:space-between; margin:.5em 0 2.2em 0; padding:1.4em 0 1.2em 0; border-top:1px solid #e8e4de; border-bottom:1px solid #e8e4de; }
  .bib-stat { text-align:center; flex:1; }
  .bib-label { font-size:.82rem; font-weight:600; letter-spacing:.04em; color:#666; text-transform:uppercase; margin-bottom:.4em; }
  .bib-number { font-size:2.8rem; font-weight:700; color:#1a2a3a; line-height:1; }

  .cite-chart { margin:-0.6em 0 2.4em 0; }
  .cite-chart-title { font-size:.82rem; font-weight:600; letter-spacing:.04em; color:#666; text-transform:uppercase; text-align:center; margin-bottom:.9em; }
  .cite-bars { display:flex; align-items:flex-end; justify-content:space-between; gap:.6em; padding-top:1.6em; }
  .cite-bar-col { flex:1; display:flex; flex-direction:column; align-items:center; }
  .cite-bar-track { width:100%; height:130px; display:flex; align-items:flex-end; justify-content:center; }
  .cite-bar-val { position:absolute; bottom:100%; left:50%; transform:translateX(-50%); font-size:1rem; font-weight:700; color:#1a2a3a; margin-bottom:.3em; line-height:1; }
  .cite-bar { position:relative; width:100%; max-width:18px; height:0; background:#4a4d54; border-radius:999px 999px 0 0; transition:height 1.1s cubic-bezier(.22,1,.36,1); }
  .cite-bar-year { font-size:.78rem; color:#666; margin-top:.5em; letter-spacing:.02em; }

  [data-theme="dark"] { background:#141824; }
  [data-theme="dark"] body { background:#141824; color:#cdd4e0; }
  [data-theme="dark"] .bib-stats { border-top-color:#2a3040; border-bottom-color:#2a3040; }
  [data-theme="dark"] .bib-label { color:#8a95a8; }
  [data-theme="dark"] .bib-number { color:#dde3ec; }
  [data-theme="dark"] .cite-chart-title, [data-theme="dark"] .cite-bar-year { color:#8a95a8; }
  [data-theme="dark"] .cite-bar-val { color:#dde3ec; }
  [data-theme="dark"] .cite-bar { background:#e6e9ef; }
</style>
</head>
<body>
<button class="toggle" onclick="var h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'':'dark')">light / dark</button>

<div class="bib-stats">
  <div class="bib-stat"><div class="bib-label">Publications</div><div class="bib-number" data-target="13">0</div></div>
  <div class="bib-stat"><div class="bib-label">Cites</div><div class="bib-number" data-target="87">0</div></div>
  <div class="bib-stat"><div class="bib-label">H Index</div><div class="bib-number" data-target="2">0</div></div>
</div>

<div class="cite-chart">
  <div class="cite-chart-title">Citations per year</div>
  <div class="cite-bars">
    <div class="cite-bar-col"><div class="cite-bar-track"><div class="cite-bar" data-h="35"><span class="cite-bar-val" data-val="7">0</span></div></div><span class="cite-bar-year">2021</span></div>
    <div class="cite-bar-col"><div class="cite-bar-track"><div class="cite-bar" data-h="75"><span class="cite-bar-val" data-val="15">0</span></div></div><span class="cite-bar-year">2022</span></div>
    <div class="cite-bar-col"><div class="cite-bar-track"><div class="cite-bar" data-h="100"><span class="cite-bar-val" data-val="20">0</span></div></div><span class="cite-bar-year">2023</span></div>
    <div class="cite-bar-col"><div class="cite-bar-track"><div class="cite-bar" data-h="95"><span class="cite-bar-val" data-val="19">0</span></div></div><span class="cite-bar-year">2024</span></div>
    <div class="cite-bar-col"><div class="cite-bar-track"><div class="cite-bar" data-h="80"><span class="cite-bar-val" data-val="16">0</span></div></div><span class="cite-bar-year">2025</span></div>
    <div class="cite-bar-col"><div class="cite-bar-track"><div class="cite-bar" data-h="40"><span class="cite-bar-val" data-val="8">0</span></div></div><span class="cite-bar-year">2026</span></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.bib-number').forEach(function (el) {
    var t = parseInt(el.getAttribute('data-target'),10), s = performance.now();
    (function step(now){ var p=Math.min((now-s)/1000,1),e=1-Math.pow(1-p,3); el.textContent=Math.round(e*t); if(p<1)requestAnimationFrame(step);})(s);
  });
  var chart = document.querySelector('.cite-chart');
  function animate(){
    chart.querySelectorAll('.cite-bar').forEach(function(b){ b.style.height=(parseFloat(b.getAttribute('data-h'))||0)+'%'; });
    chart.querySelectorAll('.cite-bar-val').forEach(function(el){
      var t=parseInt(el.getAttribute('data-val'),10)||0, s=performance.now();
      (function step(now){ var p=Math.min((now-s)/1100,1),e=1-Math.pow(1-p,3); el.textContent=Math.round(e*t); if(p<1)requestAnimationFrame(step);})(s);
    });
  }
  setTimeout(animate, 200);
});
</script>
</body>
</html>
