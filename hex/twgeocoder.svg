<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 173 200" role="img" aria-label="twgeocoder package hex badge">
  <!-- hexagon -->
  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="#2b7a8c" stroke="#1d5562" stroke-width="4" stroke-linejoin="round"/>
  <!-- inner border -->
  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="none" stroke="#bfe1e8" stroke-width="1.5" stroke-linejoin="round" opacity="0.55" transform="translate(86.5,100) scale(0.92) translate(-86.5,-100)"/>

  <!-- motif: location pin over a graticule (coordinates) -->
  <!-- faint coordinate graticule -->
  <g stroke="#bfe1e8" stroke-width="1.2" opacity="0.35">
    <line x1="40" y1="58" x2="133" y2="58"/>
    <line x1="40" y1="86" x2="133" y2="86"/>
    <line x1="58" y1="38" x2="58" y2="108"/>
    <line x1="115" y1="38" x2="115" y2="108"/>
  </g>

  <!-- ground shadow (tint) -->
  <ellipse cx="86.5" cy="120" rx="17" ry="4" fill="#bfe1e8" opacity="0.7"/>

  <!-- map pin (white) with punched-through hole -->
  <path fill="#ffffff" fill-rule="evenodd" d="
    M86.5 40 C 72.4 40 61 51.4 61 65.5 C 61 83 86.5 113 86.5 113
    C 86.5 113 112 83 112 65.5 C 112 51.4 100.6 40 86.5 40 Z
    M86.5 55 a 10 10 0 1 0 0.1 0 z"/>

  <!-- name -->
  <text x="86.5" y="148" text-anchor="middle" textLength="150" lengthAdjust="spacingAndGlyphs" font-family="Palatino, 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-weight="bold" font-size="24" fill="#ffffff">twgeocoder</text>
</svg>
