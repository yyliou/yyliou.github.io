  </g>

  <!-- name -->
  <text x="86.5" y="146" text-anchor="middle" font-family="Palatino, 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-weight="bold" font-size="26" fill="#ffffff">twcovid</text>
</svg>
