    <line x1="66.5" y1="72.0" x2="53.5" y2="72.0"/>
    <line x1="69.2" y1="62.0" x2="57.9" y2="55.5"/>
    <line x1="76.5" y1="54.7" x2="70.0" y2="43.4"/>
    <line x1="86.5" y1="52.0" x2="86.5" y2="39.0"/>
    <line x1="96.5" y1="54.7" x2="103.0" y2="43.4"/>
    <line x1="103.8" y1="62.0" x2="115.1" y2="55.5"/>
  </g>
  <!-- spike knobs -->
  <g fill="#ffffff">
    <circle cx="123.5" cy="72.0" r="3.6"/>
    <circle cx="118.5" cy="90.5" r="3.6"/>
    <circle cx="105.0" cy="104.0" r="3.6"/>
    <circle cx="86.5" cy="109.0" r="3.6"/>
    <circle cx="68.0" cy="104.0" r="3.6"/>
    <circle cx="54.5" cy="90.5" r="3.6"/>
    <circle cx="49.5" cy="72.0" r="3.6"/>
    <circle cx="54.5" cy="53.5" r="3.6"/>
    <circle cx="68.0" cy="40.0" r="3.6"/>
    <circle cx="86.5" cy="35.0" r="3.6"/>
    <circle cx="105.0" cy="40.0" r="3.6"/>
    <circle cx="118.5" cy="53.5" r="3.6"/>
  </g>
  <!-- core -->
  <circle cx="86.5" cy="72" r="21" fill="#ffffff"/>
