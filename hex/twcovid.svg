  <!-- motif: coronavirus virion (white) -->
  <!-- spikes -->
  <g stroke="#ffffff" stroke-width="3.4" stroke-linecap="round">
    <line x1="106.5" y1="72.0" x2="119.5" y2="72.0"/>
    <line x1="103.8" y1="82.0" x2="115.1" y2="88.5"/>
    <line x1="96.5" y1="89.3" x2="103.0" y2="100.6"/>
