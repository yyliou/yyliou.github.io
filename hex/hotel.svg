  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="none" stroke="#e0c2d2" stroke-width="1.5" stroke-linejoin="round" opacity="0.55" transform="translate(86.5,100) scale(0.92) translate(-86.5,-100)"/>

  <!-- rating stars (tint) -->
  <g fill="#e0c2d2" opacity="0.9">
    <path d="M0,-6 L1.41,-1.94 L5.71,-1.85 L2.28,0.74 L3.53,4.85 L0,2.4 L-3.53,4.85 L-2.28,0.74 L-5.71,-1.85 L-1.41,-1.94 Z" transform="translate(68.5,44)"/>
