    <path d="M0,-6 L1.41,-1.94 L5.71,-1.85 L2.28,0.74 L3.53,4.85 L0,2.4 L-3.53,4.85 L-2.28,0.74 L-5.71,-1.85 L-1.41,-1.94 Z" transform="translate(92.5,44)"/>
    <path d="M0,-6 L1.41,-1.94 L5.71,-1.85 L2.28,0.74 L3.53,4.85 L0,2.4 L-3.53,4.85 L-2.28,0.74 L-5.71,-1.85 L-1.41,-1.94 Z" transform="translate(104.5,44)"/>
  </g>

  <!-- hotel facade (white) with punched-through windows + door -->
  <path fill="#ffffff" fill-rule="evenodd" d="
    M58 58 h57 a3 3 0 0 1 3 3 v59 h-63 v-59 a3 3 0 0 1 3 -3 z
    M64 64 h10 v10 h-10 z   M81 64 h10 v10 h-10 z   M98 64 h10 v10 h-10 z
    M64 78 h10 v10 h-10 z   M81 78 h10 v10 h-10 z   M98 78 h10 v10 h-10 z
    M64 92 h10 v10 h-10 z                            M98 92 h10 v10 h-10 z
    M80 104 h13 v16 h-13 z"/>

  <!-- entrance canopy + ground line (tint) -->
  <line x1="74" y1="104" x2="99" y2="104" stroke="#e0c2d2" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="46" y1="121" x2="127" y2="121" stroke="#e0c2d2" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- name -->
  <text x="86.5" y="147" text-anchor="middle" font-family="Palatino, 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-weight="bold" font-size="25" fill="#ffffff">twhotel</text>
