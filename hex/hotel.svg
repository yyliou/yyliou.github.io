<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 173 200" role="img" aria-label="twhotel package hex badge">
  <!-- hexagon -->
  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="#7a4a63" stroke="#5c3149" stroke-width="4" stroke-linejoin="round"/>
