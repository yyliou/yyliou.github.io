<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 173 200" role="img" aria-label="agrstat package hex badge">
  <!-- hexagon -->
  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="#4f9d3a" stroke="#357025" stroke-width="4" stroke-linejoin="round"/>
  <!-- inner border -->
  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="none" stroke="#d4ecc6" stroke-width="1.5" stroke-linejoin="round" opacity="0.55" transform="translate(86.5,100) scale(0.92) translate(-86.5,-100)"/>

  <!-- motif: ascending bar chart (statistics) with a sprout growing from the tallest bar (agriculture) -->
  <!-- bars (white) -->
  <g fill="#ffffff">
    <rect x="56"  y="94" width="14" height="18" rx="1.5"/>
    <rect x="76"  y="82" width="14" height="30" rx="1.5"/>
    <rect x="96"  y="66" width="14" height="46" rx="1.5"/>
  </g>
  <!-- sprout stem + two leaves rising from the tallest bar -->
  <path d="M103 66 q0 -12 9 -18" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <path d="M112 48 q12 -3 18 5 q-12 5 -18 -5 z" fill="#ffffff"/>
  <path d="M105 56 q-12 -4 -18 3 q11 6 18 -3 z" fill="#ffffff"/>

  <!-- ground line (tint) -->
  <line x1="48" y1="113" x2="125" y2="113" stroke="#d4ecc6" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- name -->
  <text x="86.5" y="146" text-anchor="middle" font-family="Palatino, 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-weight="bold" font-size="27" fill="#ffffff">agrstat</text>
</svg>
