<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 173 200" role="img" aria-label="scen package hex badge">
  <!-- hexagon -->
  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="#1f6b73" stroke="#134a50" stroke-width="4" stroke-linejoin="round"/>
  <!-- inner border -->
  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="none" stroke="#bfe1e2" stroke-width="1.5" stroke-linejoin="round" opacity="0.55" transform="translate(86.5,100) scale(0.92) translate(-86.5,-100)"/>

  <!-- motif: scenic mountains (centred on x=86.5) -->
  <g transform="translate(0,-4)">
    <!-- distant ridge (tint), symmetric -->
    <path d="M30 122 L58 86 L86.5 122 Z M86.5 122 L115 86 L143 122 Z"
          fill="#bfe1e2" opacity="0.5"/>

    <!-- front mountains (white), symmetric twin peaks -->
    <path d="M24 122 L66 60 L86.5 90 L107 60 L149 122 Z" fill="#ffffff"/>
    <!-- ridge definition -->
    <path d="M24 122 L66 60 L86.5 90 L107 60 L149 122"
          fill="none" stroke="#1f6b73" stroke-width="1.4" opacity="0.25" stroke-linejoin="round"/>

    <!-- baseline -->
    <line x1="24" y1="122" x2="149" y2="122" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- name -->
  <text x="86.5" y="147" text-anchor="middle" font-family="Palatino, 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-weight="bold" font-size="27" fill="#ffffff">scen</text>
</svg>
