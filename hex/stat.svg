<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 173 200" role="img" aria-label="Statistics course hex badge">
  <!-- hexagon -->
  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="#2b4c6f" stroke="#1d3650" stroke-width="4" stroke-linejoin="round"/>
  <!-- inner border -->
  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="none" stroke="#9fc2e0" stroke-width="1.5" stroke-linejoin="round" opacity="0.55" transform="translate(86.5,100) scale(0.92) translate(-86.5,-100)"/>
  <!-- motif, shifted up -->
  <g transform="translate(0,-8)">
  <!-- histogram bars under the curve -->
  <g fill="#9fc2e0" opacity="0.45">
    <rect x="44" y="104" width="13" height="16" rx="1.5"/>
    <rect x="59" y="88" width="13" height="32" rx="1.5"/>
    <rect x="74" y="72" width="13" height="48" rx="1.5"/>
    <rect x="89" y="76" width="13" height="44" rx="1.5"/>
    <rect x="104" y="94" width="13" height="26" rx="1.5"/>
    <rect x="119" y="108" width="13" height="12" rx="1.5"/>
  </g>
  <!-- normal curve -->
  <path d="M30 120 C 58 120, 62 60, 86.5 60 C 111 60, 115 120, 143 120" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
  <!-- baseline -->
  <line x1="28" y1="121" x2="145" y2="121" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  </g>
  <!-- name -->
  <text x="86.5" y="140" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="22" fill="#ffffff">Statistics</text>
</svg>
