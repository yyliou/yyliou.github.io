<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 173 200" role="img" aria-label="twweather package hex badge">
  <!-- hexagon -->
  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="#3a82c4" stroke="#27598c" stroke-width="4" stroke-linejoin="round"/>
  <!-- inner border -->
  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="none" stroke="#cfe6f7" stroke-width="1.5" stroke-linejoin="round" opacity="0.55" transform="translate(86.5,100) scale(0.92) translate(-86.5,-100)"/>
  <!-- motif: single colour (white), shifted down -->
  <g transform="translate(0,12)" fill="#ffffff" stroke="#ffffff">
    <!-- sun -->
    <g stroke-width="4" stroke-linecap="round">
      <line x1="56" y1="40" x2="56" y2="30"/>
      <line x1="40" y1="46" x2="33" y2="39"/>
      <line x1="34" y1="62" x2="24" y2="62"/>
      <line x1="40" y1="78" x2="33" y2="85"/>
      <line x1="72" y1="46" x2="79" y2="39"/>
    </g>
    <circle cx="56" cy="62" r="13" stroke="none"/>
    <!-- cloud -->
    <g stroke="none">
      <circle cx="98" cy="80" r="19"/>
      <circle cx="79" cy="88" r="13"/>
      <circle cx="117" cy="88" r="12"/>
      <rect x="79" y="88" width="38" height="16" rx="8"/>
    </g>
  </g>
  <!-- name -->
  <text x="86.5" y="142" text-anchor="middle" font-family="'SFMono-Regular', Menlo, Consolas, 'Courier New', monospace" font-weight="bold" font-size="18" fill="#ffffff">twweather</text>
</svg>
