<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 173 200" role="img" aria-label="plvr package hex badge">
  <!-- hexagon -->
  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="#b5832e" stroke="#8a6320" stroke-width="4" stroke-linejoin="round"/>
  <!-- inner border -->
  <path d="M86.5 2 L171 50.5 V149.5 L86.5 198 L2 149.5 V50.5 Z" fill="none" stroke="#ecd6a8" stroke-width="1.5" stroke-linejoin="round" opacity="0.55" transform="translate(86.5,100) scale(0.92) translate(-86.5,-100)"/>

  <!-- roof (white) -->
  <path d="M48 82 L86.5 50 L125 82 Z" fill="#ffffff"/>
  <!-- house body (white) with punched-through windows + door -->
  <path fill="#ffffff" fill-rule="evenodd" d="
    M56 82 h61 v34 h-61 z
    M63 90 h11 v11 h-11 z
    M99 90 h11 v11 h-11 z
    M80 98 h13 v18 h-13 z"/>
  <!-- ground line (tint) -->
  <line x1="44" y1="117" x2="129" y2="117" stroke="#ecd6a8" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- name -->
  <text x="86.5" y="146" text-anchor="middle" font-family="Palatino, 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-weight="bold" font-size="27" fill="#ffffff">plvr</text>
</svg>
